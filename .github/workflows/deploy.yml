name: Deploy para Locaweb

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ftp.gbsservicos.com
          username: gbsservicos1
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: /web/controles/velocidade/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
